name: movie_app
description: "KyiKyaMal — a Flutter movie browsing app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.6.0
  cached_network_image: ^3.4.1
  webview_flutter: ^4.14.1
  webview_flutter_android: ^4.10.13
  webview_flutter_wkwebview: ^3.24.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/branding/app_logo.png
    - assets/branding/app_logo_1024.png

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: assets/branding/app_logo_1024.png
  adaptive_icon_background: "#0B0B0F"
  adaptive_icon_foreground: assets/branding/app_logo_1024.png
  web:
    generate: true
    image_path: assets/branding/app_logo_1024.png
    background_color: "#0B0B0F"
    theme_color: "#0B0B0F"
  macos:
    generate: true
    image_path: assets/branding/app_logo_1024.png
  windows:
    generate: true
    image_path: assets/branding/app_logo_1024.png
